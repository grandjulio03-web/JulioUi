<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Capsule Pagination</title>
<link rel="stylesheet" href="../dist/my-framework.css">
<style>
  body {
    font-family: "Inter", "Poppins", "Montserrat", sans-serif;
    padding: 2rem;
    background: radial-gradient(circle at top right, rgba(114, 176, 215, 0.2), transparent 50%), #f7fafc;
    color: #041301;
  }
  .demo-shell {
    max-width: 860px;
    margin: 0 auto;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 1rem;
    padding: 1.5rem;
    box-shadow: 0 20px 45px rgba(4, 19, 1, 0.08);
  }
  .demo-head p {
    color: #6b7280;
  }
  .air-pagination-content {
    margin: 1rem 0 1.5rem;
    border: 1px dashed rgba(114, 176, 215, 0.4);
    border-radius: 0.75rem;
    padding: 1rem;
    background: #fcfdff;
    min-height: 72px;
  }
</style>
</head>
<body>
<div class="demo-shell">
  <div class="demo-head">
    <h1>Air Capsule Pagination</h1>
    <p>Simple HTML classes, premium capsule motion and active chip state.</p>
  </div>

<div id="air-content" class="air-pagination-content text-body mb-6">
  Page 1: Overview and launch summary.
</div>

<div class="air-pagination pagination-ace" aria-label="Air capsule pagination" data-jf-air-pagination data-jf-pagination-content="#air-content" data-jf-pagination-pages='{"1":"Page 1: Overview and launch summary.","2":"Page 2: Form submissions and conversion metrics.","3":"Page 3: Team activity and release checklist.","4":"Page 4: Final report and next actions."}'>
  <button id="prevBtn" disabled>‹ Prev</button>
  <button class="page-btn active" data-page="1">1</button>
  <button class="page-btn" data-page="2">2</button>
  <button class="page-btn" data-page="3">3</button>
  <button class="page-btn" data-page="4">4</button>
  <button id="nextBtn">Next ›</button>
</div>
</div>

<script src="../dist/my-framework.js"></script>

</body>
</html>
