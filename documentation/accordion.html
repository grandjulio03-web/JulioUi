<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts - JForce Framework</title>
    <link rel="stylesheet" href="/dist/my-framework.css">
    <script src="/dist/accordion.js"></script>
    <style>
        body {
            font-family: "Inter", "Poppins", "Montserrat", sans-serif;
            padding: 2rem;
            background: #f9fafb;
        }
        .docs-header {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }
        .breadcrumb a {
            color: #6b7280;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .breadcrumb a:hover {
            color: #72b0d7;
        }
        .breadcrumb-separator {
            color: #9ca3af;
        }
        .section {
            margin-bottom: 3rem;
        }
        .section-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #041301;
        }
        .section-desc {
            color: #6b7280;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .demo-card {
            background: white;
            padding: 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .demo-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #041301;
        }
        .code-block {
            background: #1f2937;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: 'Courier New', monospace;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .usage-section {
            background: rgba(114, 176, 215, 0.05);
            padding: 1.5rem;
            border-radius: 0.5rem;
            border-left: 4px solid #72b0d7;
        }
        .usage-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #041301;
        }
    </style>
</head>
<body>


    <!-- accordion -->
     <div class="accordion">
        <button class="accordion-btn">Section 1</button>
        <div class="accordion-panel">
            <div class="accordion-content">
                <p class="text-epsilon">Content for section 1...</p>
            </div>
        </div>
    </div>
  


</body>
</html>
