<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../dist/my-framework.css">
    <script src="../dist/my-framework.js"></script>
    <title>Tab Documentation</title>
</head>
<body>
    <!-- tabs -->
    <div class="tabs">
        <div class="tab-list">
            <button class="tab-btn is-active" data-tab="tab1">Tab 1</button>
            <button class="tab-btn" data-tab="tab2">Tab 2</button>
            <button class="tab-btn" data-tab="tab3">Tab 3</button>
        </div>
        <div class="tab-content is-active" id="tab1">
            <p>Content for Tab 1</p>
        </div>
        <div class="tab-content" id="tab2">
            <p>Content for Tab 2</p>
        </div>
        <div class="tab-content" id="tab3">
            <p>Content for Tab 3</p>
        </div>
    </div>
</body>
</html>
