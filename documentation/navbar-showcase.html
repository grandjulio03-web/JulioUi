<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar Showcase</title>
  <link rel="stylesheet" href="../dist/my-framework.css">
  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #f4f8fb;
      font-family: "Inter", "Poppins", "Montserrat", sans-serif;
      color: #041301;
    }
    .wrap {
      max-width: 1060px;
      margin: 0 auto;
      display: grid;
      gap: 1rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 1rem;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>World Class Navbars</h1>
      <p>Simple HTML structure, premium interaction and responsive behavior.</p>
    </div>

    <nav class="neo-nav">
      <div class="neo-nav__brand">JForceX</div>
      <ul class="neo-nav__links" id="nav-ace">
        <li><a class="neo-nav__link" href="#">Home</a></li>
        <li><a class="neo-nav__link" href="#">Components</a></li>
        <li><a class="neo-nav__link" href="#">Docs</a></li>
        <li><a class="neo-nav__link" href="#">Pricing</a></li>
      </ul>
      <div class="neo-nav__actions">
        <button class="neo-nav__cta" type="button">Start</button>
        <button class="neo-nav__toggle" type="button" data-nav-toggle="#nav-ace" aria-label="Toggle menu">☰</button>
      </div>
    </nav>

    <nav class="neo-nav neo-nav--beta">
      <div class="neo-nav__brand">JForceX Beta</div>
      <ul class="neo-nav__links" id="nav-beta">
        <li><a class="neo-nav__link" href="#">Studio</a></li>
        <li><a class="neo-nav__link" href="#">Showcase</a></li>
        <li><a class="neo-nav__link" href="#">Themes</a></li>
      </ul>
      <div class="neo-nav__actions">
        <button class="neo-nav__cta" type="button">Book demo</button>
        <button class="neo-nav__toggle" type="button" data-nav-toggle="#nav-beta" aria-label="Toggle menu">☰</button>
      </div>
    </nav>

    <nav class="neo-nav neo-nav--hero neo-nav--gamma">
      <div class="neo-nav__brand">Air Hero Nav</div>
      <ul class="neo-nav__links" id="nav-hero">
        <li><a class="neo-nav__link" href="#">Launch</a></li>
        <li><a class="neo-nav__link" href="#">Roadmap</a></li>
        <li><a class="neo-nav__link" href="#">Support</a></li>
      </ul>
      <div class="neo-nav__actions">
        <button class="neo-nav__cta" type="button">Get access</button>
        <button class="neo-nav__toggle" type="button" data-nav-toggle="#nav-hero" aria-label="Toggle menu">☰</button>
      </div>
    </nav>
  </div>

  <script src="../dist/my-framework.js"></script>
</body>
</html>
