<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Documentation</title>
    <link rel="stylesheet" href="../dist/my-framework.css">
    <script src="../dist/my-framework.js"></script>
</head>
<body>
    <!-- carousel -->
   <div class="carousel carousel-h-md">
  <div class="carousel-viewport">
    <div class="carousel-track">
      <div class="carousel-slide active">
        <img src="https://picsum.photos/800/450?random=1" alt="Slide 1">
      </div>
      <div class="carousel-slide">
        <img src="https://picsum.photos/800/450?random=2" alt="Slide 2">
      </div>
      <div class="carousel-slide">
        <img src="https://picsum.photos/800/450?random=3" alt="Slide 3">
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <button class="carousel-btn carousel-prev">&#10094;</button>
  <button class="carousel-btn carousel-next">&#10095;</button>

  <!-- Dots -->
  <div class="carousel-dots">
    <span class="carousel-dot is-active"></span>
    <span class="carousel-dot"></span>
    <span class="carousel-dot"></span>
  </div>
</div>


</body>
</html>
