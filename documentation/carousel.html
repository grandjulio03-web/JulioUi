<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Carousel</title>
    <link rel="stylesheet" href="../dist/my-framework.css">
    <script src="../dist/my-framework.js"></script>
    <style>
      body {
        margin: 0;
        padding: 2rem;
        background: radial-gradient(circle at top right, rgba(114, 176, 215, 0.2), transparent 45%), #f7fafc;
        font-family: "Inter", "Poppins", "Montserrat", sans-serif;
        color: #041301;
      }
      .demo-wrap {
        max-width: 940px;
        margin: 0 auto;
        display: grid;
        gap: 1.25rem;
      }
      .demo-head {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 1rem;
        padding: 1.2rem;
      }
      .demo-head p {
        margin: 0.5rem 0 0;
        color: #6b7280;
      }
    </style>
</head>
<body>
<div class="demo-wrap">
  <div class="demo-head">
    <h1>Air Carousel</h1>
    <p>Simple HTML structure, premium capsule controls and smooth transitions.</p>
  </div>

  <div class="carousel carousel-gamma" aria-label="Showcase carousel">
    <div class="carousel-viewport">
      <div class="carousel-track">
      <div class="carousel-slide is-active">
        <img src="https://picsum.photos/1100/620?random=31" alt="Slide 1">
      </div>
      <div class="carousel-slide">
        <img src="https://picsum.photos/1100/620?random=32" alt="Slide 2">
      </div>
      <div class="carousel-slide">
        <img src="https://picsum.photos/1100/620?random=33" alt="Slide 3">
      </div>
      <div class="carousel-slide">
        <img src="https://picsum.photos/1100/620?random=34" alt="Slide 4">
      </div>
      </div>
    </div>

    <button class="carousel-btn carousel-prev" aria-label="Previous slide">‹</button>
    <button class="carousel-btn carousel-next" aria-label="Next slide">›</button>

    <div class="carousel-dots" aria-label="Slide navigation">
      <span class="carousel-dot is-active"></span>
      <span class="carousel-dot"></span>
      <span class="carousel-dot"></span>
      <span class="carousel-dot"></span>
    </div>
  </div>
</div>
</body>
</html>
