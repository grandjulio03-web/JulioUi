<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Typography Test - JForce Framework</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/dist/my-framework.css">
</head>

<body class="p-8 bg-epsilon-light">

<div>

    <p class="text-ace">hello world</p>
    <p class="text-beta">hello world</p>
    <p class="text-gamma">hello world</p>
    <p class="text-delta">hello world</p>
    <p class="text-epsilon">hello world</p>
</div>

<div>
    <p class="text-small">hello</p>
    <p class="text-normal">hello</p>
    <p class="text-large">hello</p>
    <h1 class="text-heading">hello</h1>
</div>

<div>
    <p class="text-light">hello</p>
    <p class="text-regular">hello</p>
    <p class="text-bold">hello</p>
</div>

<div>
    <p class="heading-light">hello</p>
    <p class="heading-bold">hello</p>
    <p class="subheading">hello</p>
    <p class="body-text">hello</p>
    <p class="caption">hello</p>
</div>



</body>
</html>
