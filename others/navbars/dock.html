<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rib Navbar - Dock</title>
  <link rel="stylesheet" href="dist/my-framework.css" />
  <script src="dist/my-framework.js" defer></script>
</head>
<body class="rib-demo">
  <div class="rib-demo-page">
    <h1 style="margin: 0 0 8px 0;">Rib Navbar: Dock</h1>
    <div class="rib-demo-hint">Mobile: dock stays as icon row. Desktop: use toggle to choose a category (pack) and its links appear in the bar.</div>

    <div class="rib-demo-box" style="margin-bottom: 110px;">
      <nav class="rib rib-dock" data-open="false">
        <div class="rib-bar">
          <a class="rib-brand" href="#">
            <span class="rib-mark"></span>
            <span>Dock</span>
          </a>

          <div class="rib-rail">
            <div class="dock-pack" data-pack="pulse">
              <a class="rib-link dock-ico" href="#" aria-label="Home" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Explore"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m14.5 9.5-6 2.5 2.5 6 3.5-8.5Z"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Bookmarks"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12v18l-6-4-6 4V3Z"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Inbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v12H4z"/><path d="M4 16l4 4h8l4-4"/><path d="M9 12h6"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></a>
            </div>

            <div class="dock-pack" data-pack="forge">
              <a class="rib-link dock-ico" href="#" aria-label="Projects" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Tasks"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Calendar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v3"/><path d="M17 3v3"/><path d="M4 8h16"/><rect x="4" y="6" width="16" height="16" rx="2"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Notes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h10v14H7z"/><path d="M17 17l-3 4H7v-4h10Z"/><path d="M9 7h6"/><path d="M9 10h6"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Files"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h6l2 2h8v12H4z"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a7.7 7.7 0 0 0 .1-6l2-1.2-2-3.5-2.3.8a7.7 7.7 0 0 0-5.2-3L11 1H9l-.9 2.9a7.7 7.7 0 0 0-5.2 3L.6 6.3l2 3.5 2-1.2a7.7 7.7 0 0 0 0 6l-2 1.2 2 3.5 2.3-.8a7.7 7.7 0 0 0 5.2 3L9 23h2l.9-2.9a7.7 7.7 0 0 0 5.2-3l2.3.8 2-3.5-2-1.2Z"/></svg></a>
            </div>

            <div class="dock-pack" data-pack="market">
              <a class="rib-link dock-ico" href="#" aria-label="Shop" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16l-1 13H5L4 7Z"/><path d="M9 7a3 3 0 0 1 6 0"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Cart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-2 9H7L6 6Z"/><path d="M6 6 5 3H2"/><circle cx="9" cy="19" r="1"/><circle cx="18" cy="19" r="1"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Orders"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h10v18H7z"/><path d="M9 7h6"/><path d="M9 11h6"/><path d="M9 15h4"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Wallet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18v14H3z"/><path d="M3 7l2-4h14l2 4"/><path d="M17 14h4"/></svg></a>
              <a class="rib-link dock-ico" href="#" aria-label="Support"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 0 1 16 0"/><path d="M6 12v4a2 2 0 0 1-2 2"/><path d="M18 12v4a2 2 0 0 0 2 2"/><path d="M9 21h6"/></svg></a>
            </div>
          </div>


          <button class="rib-tog" type="button" aria-controls="ribDockPanel" aria-expanded="false"></button>
        </div>

        <div class="rib-panel" id="ribDockPanel">
          <div class="dock-chooser">
            <div class="rib-demo-hint"><b>Choose pack</b> (this changes the 6 icons shown in the dock row)</div>
            <div class="dock-picks">
              <button class="dock-pick" type="button" data-pack="pulse"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 4 14h7l-1 8 10-14h-7l0-6Z"/></svg>Pulse</button>
              <button class="dock-pick" type="button" data-pack="forge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4 4 14"/><path d="M8 10l6 6"/><path d="M12 12l8-8"/></svg>Forge</button>
              <button class="dock-pick" type="button" data-pack="market"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16l-1 13H5L4 7Z"/><path d="M9 7a3 3 0 0 1 6 0"/></svg>Market</button>
            </div>
          </div>
        </div>
      </nav>

      <!-- Dock: mobile bottom bar (thumb-friendly). Same toggle opens a full stacked menu. -->

    </div>
  </div>
</body>
</html>
